name: 08 - Environment Variables

on:
    push:
    workflow_dispatch:

jobs:
    echo:
        runs-on: ubuntu-latest
        env:
            first_name: "Pankaj Naval"
        steps: 
            - name: Print Environment Variables
              env:
                first_name: "Pankaj"
              run: |
                echo "Name $first_name"
            - name : Print another variable
              run: |
                echo "Name $first_name"
